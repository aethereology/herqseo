name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The Python suite's DB tests import SQLAlchemy; install the runtime with
      # its db extra so they run (on SQLite) instead of erroring on import.
      - run: pip install -e "./services/agent-runtime[db]"
      - run: npm install
      - run: npm run ci

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: queryclear
          POSTGRES_PASSWORD: queryclear
          POSTGRES_DB: queryclear
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install psql client and runtime (db extra)
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          pip install -e "./services/agent-runtime[db]"
      - name: Apply migrations, create app role, seed tenants
        env:
          PGPASSWORD: queryclear
        run: |
          PSQL="psql -h localhost -U queryclear -d queryclear -v ON_ERROR_STOP=1"
          $PSQL -f packages/db/migrations/0001_initial_tenancy/migration.sql
          $PSQL -f packages/db/migrations/0002_runtime_persistence/migration.sql
          $PSQL <<'SQL'
          CREATE ROLE qc_app LOGIN PASSWORD 'qc_app_pw';
          GRANT USAGE ON SCHEMA app, public TO qc_app;
          GRANT EXECUTE ON FUNCTION app.current_org_id() TO qc_app;
          GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO qc_app;
          INSERT INTO organizations (id, name, token_budget_monthly) VALUES
            ('11111111-1111-1111-1111-111111111111', 'Org A', 1000000),
            ('22222222-2222-2222-2222-222222222222', 'Org B', 1000000);
          INSERT INTO domains (id, org_id, url, cms_type) VALUES
            ('aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa', '11111111-1111-1111-1111-111111111111', 'https://a.test', 'wordpress'),
            ('bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb', '22222222-2222-2222-2222-222222222222', 'https://b.test', 'wordpress');
          SQL
      - name: Run Postgres integration tests (as non-superuser role)
        env:
          QC_TEST_DATABASE_URL: postgresql+psycopg://qc_app:qc_app_pw@localhost:5432/queryclear
        run: python -m unittest discover -s services/agent-runtime/tests
